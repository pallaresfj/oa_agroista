x-laravel-env: &laravel-env
  APP_NAME: ${APP_NAME}
  APP_ENV: ${APP_ENV}
  APP_KEY: ${APP_KEY}
  APP_DEBUG: ${APP_DEBUG}
  APP_URL: ${APP_URL}
  APP_LOCALE: ${APP_LOCALE}
  APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE}
  APP_FAKER_LOCALE: ${APP_FAKER_LOCALE}
  APP_TIMEZONE: ${APP_TIMEZONE}
  APP_MAINTENANCE_DRIVER: ${APP_MAINTENANCE_DRIVER}

  LOG_CHANNEL: stderr
  LOG_STACK: single
  LOG_LEVEL: ${LOG_LEVEL}

  DB_CONNECTION: mysql
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT}
  DB_DATABASE: ${DB_DATABASE}
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}

  SESSION_DRIVER: redis
  SESSION_LIFETIME: ${SESSION_LIFETIME}
  SESSION_ENCRYPT: "false"
  SESSION_COOKIE: ${SESSION_COOKIE}
  SESSION_PATH: ${SESSION_PATH}
  SESSION_DOMAIN: ${SESSION_DOMAIN}
  SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE}
  SESSION_HTTP_ONLY: ${SESSION_HTTP_ONLY}
  SESSION_SAME_SITE: ${SESSION_SAME_SITE}

  BROADCAST_CONNECTION: log
  FILESYSTEM_DISK: ${FILESYSTEM_DISK}
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis

  REDIS_CLIENT: phpredis
  REDIS_HOST: ${REDIS_HOST}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  REDIS_PORT: ${REDIS_PORT}
  REDIS_PREFIX: ${REDIS_PREFIX}

  MAIL_MAILER: ${MAIL_MAILER}
  MAIL_SCHEME: ${MAIL_SCHEME}
  MAIL_HOST: ${MAIL_HOST}
  MAIL_PORT: ${MAIL_PORT}
  MAIL_USERNAME: ${MAIL_USERNAME}
  MAIL_PASSWORD: ${MAIL_PASSWORD}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME}

  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
  GOOGLE_SESSION_CHECK_REDIRECT_URI: ${GOOGLE_SESSION_CHECK_REDIRECT_URI}

  ISSUER: ${ISSUER}
  OIDC_FORCE_HTTPS: ${OIDC_FORCE_HTTPS}
  OIDC_KEY_ID: ${OIDC_KEY_ID}

  INSTITUTION_EMAIL_DOMAIN: ${INSTITUTION_EMAIL_DOMAIN}
  INSTITUTION_CODE: ${INSTITUTION_CODE}
  INSTITUTION_DEFAULT_NAME: ${INSTITUTION_DEFAULT_NAME}
  INSTITUTION_DEFAULT_NIT: ${INSTITUTION_DEFAULT_NIT}
  INSTITUTION_DEFAULT_LOGO_URL: ${INSTITUTION_DEFAULT_LOGO_URL}
  INSTITUTION_DEFAULT_PRIMARY_COLOR: ${INSTITUTION_DEFAULT_PRIMARY_COLOR}
  INSTITUTION_DEFAULT_SUCCESS_COLOR: ${INSTITUTION_DEFAULT_SUCCESS_COLOR}
  INSTITUTION_DEFAULT_INFO_COLOR: ${INSTITUTION_DEFAULT_INFO_COLOR}
  INSTITUTION_DEFAULT_WARNING_COLOR: ${INSTITUTION_DEFAULT_WARNING_COLOR}
  INSTITUTION_DEFAULT_DANGER_COLOR: ${INSTITUTION_DEFAULT_DANGER_COLOR}

  PLANES_BASE_URL: ${PLANES_BASE_URL}
  PLANES_CLIENT_ID: ${PLANES_CLIENT_ID}
  PLANES_CLIENT_SECRET: ${PLANES_CLIENT_SECRET}
  ASISTENCIA_BASE_URL: ${ASISTENCIA_BASE_URL}
  ASISTENCIA_CLIENT_ID: ${ASISTENCIA_CLIENT_ID}
  ASISTENCIA_CLIENT_SECRET: ${ASISTENCIA_CLIENT_SECRET}
  SILO_BASE_URL: ${SILO_BASE_URL}
  SILO_CLIENT_ID: ${SILO_CLIENT_ID}
  SILO_CLIENT_SECRET: ${SILO_CLIENT_SECRET}

  TOKEN_TTL_MINUTES: ${TOKEN_TTL_MINUTES}
  REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS}

  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
  SSO_ALLOWED_REDIRECT_HOSTS: ${SSO_ALLOWED_REDIRECT_HOSTS}
  SSO_INSECURE_REDIRECT_HOSTS: ${SSO_INSECURE_REDIRECT_HOSTS}
  SSO_POST_LOGOUT_REDIRECT_HOSTS: ${SSO_POST_LOGOUT_REDIRECT_HOSTS}
  SSO_FRONTCHANNEL_LOGOUT_CLIENTS: ${SSO_FRONTCHANNEL_LOGOUT_CLIENTS}
  SSO_FRONTCHANNEL_LOGOUT_SECRETS: ${SSO_FRONTCHANNEL_LOGOUT_SECRETS}
  SSO_FRONTCHANNEL_LOGOUT_TTL_SECONDS: ${SSO_FRONTCHANNEL_LOGOUT_TTL_SECONDS}

  GOOGLE_LOGOUT_FROM_BROWSER: ${GOOGLE_LOGOUT_FROM_BROWSER}
  GOOGLE_SESSION_CHECK_ENABLED: ${GOOGLE_SESSION_CHECK_ENABLED}
  GOOGLE_SESSION_CHECK_INTERVAL_SECONDS: ${GOOGLE_SESSION_CHECK_INTERVAL_SECONDS}
  GOOGLE_SESSION_CHECK_TIMEOUT_SECONDS: ${GOOGLE_SESSION_CHECK_TIMEOUT_SECONDS}

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    environment:
      <<: *laravel-env
    expose:
      - "80"
    volumes:
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    environment:
      <<: *laravel-env
    depends_on:
      web:
        condition: service_started
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--timeout=120", "--max-jobs=500"]
    volumes:
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache
    networks:
      - dokploy-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    environment:
      <<: *laravel-env
    depends_on:
      web:
        condition: service_started
    command: ["sh", "-lc", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    volumes:
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache
    networks:
      - dokploy-network

volumes:
  laravel_storage:
  laravel_cache:

networks:
  dokploy-network:
    external: true
