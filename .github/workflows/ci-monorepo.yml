name: CI Monorepo

on:
  pull_request:
    paths:
      - "apps/**"
      - "core/**"
      - ".github/workflows/**"
  push:
    branches: ["main"]
    paths:
      - "apps/**"
      - "core/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-monorepo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      planes: ${{ steps.filter.outputs.planes }}
      asistencia: ${{ steps.filter.outputs.asistencia }}
      lectura: ${{ steps.filter.outputs.lectura }}
      silo: ${{ steps.filter.outputs.silo }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth:
              - 'apps/auth/**'
              - 'core/**'
              - '.github/workflows/**'
            planes:
              - 'apps/planes/**'
              - 'core/**'
              - '.github/workflows/**'
            asistencia:
              - 'apps/asistencia/**'
              - 'core/**'
              - '.github/workflows/**'
            lectura:
              - 'apps/lectura/**'
              - 'core/**'
              - '.github/workflows/**'
            silo:
              - 'apps/silo/**'
              - 'core/**'
              - '.github/workflows/**'

  ci-auth:
    name: CI auth
    needs: changes
    if: needs.changes.outputs.auth == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-app-ci.yml
    with:
      app_name: auth
      app_path: apps/auth

  ci-planes:
    name: CI planes
    needs: changes
    if: needs.changes.outputs.planes == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-app-ci.yml
    with:
      app_name: planes
      app_path: apps/planes

  ci-asistencia:
    name: CI asistencia
    needs: changes
    if: needs.changes.outputs.asistencia == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-app-ci.yml
    with:
      app_name: asistencia
      app_path: apps/asistencia

  ci-lectura:
    name: CI lectura
    needs: changes
    if: needs.changes.outputs.lectura == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-app-ci.yml
    with:
      app_name: lectura
      app_path: apps/lectura

  ci-silo:
    name: CI silo
    needs: changes
    if: needs.changes.outputs.silo == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-app-ci.yml
    with:
      app_name: silo
      app_path: apps/silo
